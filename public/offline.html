<!doctype html>
<html lang="en-NG">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — ShowMePrice</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #ffffff;
        color: #0f172a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      h1 {
        font-size: 18px;
        font-weight: 500;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: #475569;
        margin: 0 0 20px;
        max-width: 320px;
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: 0;
        background: #0d9488;
        color: #fff;
        font: inherit;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        background: #0f766e;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>You&rsquo;re offline.</h1>
      <p>Check your connection and try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
